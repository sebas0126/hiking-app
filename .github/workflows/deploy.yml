name: Deploy con Envs
on:
  push:
    branches: [main]

permissions:
  contents: write # Necesario para crear/escribir en la rama gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Crear env-config.js 🛠️
        run: |
          echo "window._env_ = { 
            API_HOSTNAME: '${{ secrets.API_HOSTNAME }}'
          };" > env-config.js

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
